<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">🍃🍿 <span>MovieNight</span></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for a movie (e.g. Batman)...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <main>
        <section id="featuredMovie" class="hero"></section>
        <section class="movie-grid" id="movieGrid">

        </section>
    </main>

    <footer style="text-align: center; padding: 20px; color: #50C878;">
        <p>&copy; 2026 Movie Night Planner - WDD 330 Final Project</p>
    </footer>

    <script src="main.js" type="module"></script>
</body>
</html>
